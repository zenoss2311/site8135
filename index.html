<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCK BY YUDZX</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
color:#fff;
}

.flash{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
z-index:999;
}

.flash.active{
animation:flashRed .4s ease 2;
}

@keyframes flashRed{
0%{opacity:0;}
30%{opacity:.6;}
60%{opacity:.2;}
100%{opacity:0;}
}

.bg{
position:fixed;
inset:0;
background:radial-gradient(circle,#ff000020,transparent 60%),#000;
}

/* CARD */
.card{
width:370px;
background:rgba(30,0,0,.9);
border:1px solid #ff000055;
border-radius:30px;
padding:25px;
text-align:center;
box-shadow:0 0 40px #ff000044;
z-index:2;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid red;
box-shadow:0 0 20px red;
}

.name{
margin-top:12px;
font-size:24px;
font-weight:bold;
}

.verify{
display:inline-flex;
justify-content:center;
align-items:center;
width:22px;
height:22px;
background:#1da1f2;
border-radius:50%;
font-size:13px;
margin-left:5px;
}

/* 🔥 GLITCH TEXT */
.glitch{
margin-top:15px;
font-size:28px;
font-weight:bold;
color:#ff2b2b;
position:relative;
text-shadow:0 0 10px red;
animation:flicker 1.5s infinite;
}

.glitch::before,
.glitch::after{
content:"🔒 DEVICE LOCKED";
position:absolute;
left:0;
top:0;
width:100%;
overflow:hidden;
}

.glitch::before{
color:#ff0000;
transform:translateX(-2px);
animation:glitch1 .3s infinite linear alternate;
opacity:.8;
}

.glitch::after{
color:#ff5555;
transform:translateX(2px);
animation:glitch2 .25s infinite linear alternate;
opacity:.6;
}

@keyframes glitch1{
0%{clip-path:inset(0 0 80% 0);}
25%{clip-path:inset(20% 0 40% 0);}
50%{clip-path:inset(40% 0 20% 0);}
75%{clip-path:inset(10% 0 60% 0);}
100%{clip-path:inset(0 0 10% 0);}
}

@keyframes glitch2{
0%{clip-path:inset(80% 0 0 0);}
25%{clip-path:inset(60% 0 20% 0);}
50%{clip-path:inset(30% 0 50% 0);}
75%{clip-path:inset(50% 0 10% 0);}
100%{clip-path:inset(70% 0 10% 0);}
}

@keyframes flicker{
0%,100%{opacity:1;}
50%{opacity:.6;}
}

.desc{
margin-top:6px;
color:#ff8888;
font-size:13px;
}

.pin{
display:flex;
justify-content:center;
gap:10px;
margin:18px 0;
}

.dot{
width:16px;
height:16px;
border-radius:50%;
border:2px solid red;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.key{
height:60px;
border:none;
border-radius:15px;
background:#120000;
color:#fff;
font-size:22px;
border:1px solid #ff000055;
cursor:pointer;
}

.key:active{
transform:scale(0.95);
}

.footer{
margin-top:15px;
font-size:12px;
color:#aaa;
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="bg"></div>

<div class="card">

<img src="https://files.catbox.moe/z8s1jz.jpg" class="profile">

<div class="name">
@YUDZX <span class="verify">✓</span>
</div>

<div class="glitch">🔒 DEVICE LOCKED</div>

<div class="desc">Enter 4-digit security PIN</div>

<div class="pin">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">
<button class="key">1</button>
<button class="key">2</button>
<button class="key">3</button>

<button class="key">4</button>
<button class="key">5</button>
<button class="key">6</button>

<button class="key">7</button>
<button class="key">8</button>
<button class="key">9</button>

<button class="key">⌫</button>
<button class="key">0</button>
<button class="key">✓</button>
</div>

<div class="footer">LOCK BY YUDZX VERIFIED</div>

</div>

<script>
let pin = "";
const dots = document.querySelectorAll(".dot");
const flash = document.getElementById("flash");

function updateDots(){
  dots.forEach((d,i)=>{
    d.style.background = i < pin.length ? "red" : "transparent";
  });
}

function errorEffect(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200,100,300]);
  }flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");
}

document.querySelectorAll(".key").forEach(btn=>{
  btn.onclick = () => {
    let val = btn.textContent;

    if(val === "⌫"){
      pin = pin.slice(0,-1);
    }
    else if(val === "✓"){
      if(pin === "1234"){
        alert("PIN BENAR ✔");
      }else{
        alert("PIN SALAH ✖");
        errorEffect();
      }
      pin = "";
    }
    else{
      if(pin.length < 4){
        pin += val;
      }
    }

    updateDots();
  }
});
</script>

</body>
</html>
